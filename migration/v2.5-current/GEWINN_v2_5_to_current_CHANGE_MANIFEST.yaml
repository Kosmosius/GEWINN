open_todos:
- Restore/adapt the six v2.5 discrete wound tables without restoring wound points.
- Write final Shot discrete wound table.
- Write final Freezing discrete wound table.
- Tag each discrete wound result with Minor/Serious/Grave/Mortal/Catastrophic for
  current procedures.
- Finalize curated spell and miracle list; do not import every classic spell unedited.
- Finalize memory-expanding source items; they may exist but no standard purchasable
  ladder is settled.
- Recalculate all starting packages and examples from corrected prices and slots.
- Decide explicitly whether Eureka and Divine Favour remain; current magic and equipment
  do not require them.
- Rebuild character sheet and referee screen from current fields.
acceptance_greps:
  must_not_find:
  - Arms Training
  - 'Mastery:'
  - Weapon Scale
  - Draw Scale
  - Cut DR
  - Point DR
  - Crush DR
  - Pistol-proof
  - Musket-proof
  - Growth-eligible Stress
  - Source Strain
  - Relic Strain
  - Prepared Load
  - Arcane Circle
  - Holy Circle
  - Transcendent Exertion
  must_find:
  - Slashing
  - Piercing
  - Bludgeoning
  - Freezing
  - Reload N
  - recharge wound
  - Proofed
  - weight only
